syntax = "proto3";
package yaad;
option go_package = "github.com/GrayCodeAI/yaad/internal/proto";

// Core memory node
message Node {
  string id = 1;
  string type = 2;
  string content = 3;
  string summary = 4;
  string scope = 5;
  string project = 6;
  int32  tier = 7;
  string tags = 8;
  double confidence = 9;
  string source_session = 10;
  string source_agent = 11;
}

// Edge between nodes
message Edge {
  string id = 1;
  string from_id = 2;
  string to_id = 3;
  string type = 4;
  bool   acyclic = 5;
  double weight = 6;
}

// Requests / Responses
message RememberRequest {
  string content = 1;
  string type = 2;
  string summary = 3;
  string tags = 4;
  string project = 5;
  string scope = 6;
  string session = 7;
  string agent = 8;
}

message RecallRequest {
  string query = 1;
  int32  depth = 2;
  int32  limit = 3;
  string type = 4;
  string project = 5;
}

message RecallResponse {
  repeated Node nodes = 1;
  repeated Edge edges = 2;
}

message ContextRequest  { string project = 1; }
message ForgetRequest   { string id = 1; }
message LinkRequest     { string from_id = 1; string to_id = 2; string type = 3; }
message UnlinkRequest   { string id = 1; }
message SubgraphRequest { string id = 1; int32 depth = 2; }
message SubgraphResponse { repeated Node nodes = 1; repeated Edge edges = 2; }
message ImpactRequest   { string file = 1; int32 depth = 2; }
message ImpactResponse  { repeated Node nodes = 1; }
message SessionStartReq { string project = 1; string agent = 2; }
message SessionEndReq   { string id = 1; string summary = 2; }
message SessionSummary  { string id = 1; string summary = 2; }
message HealthResponse  { string status = 1; string version = 2; }
message GraphStatsResponse { int32 nodes = 1; int32 edges = 2; int32 sessions = 3; }
message WatchRequest    { string project = 1; }
message MemoryEvent     { string event = 1; Node node = 2; }  // created|updated|deleted
message StaleEvent      { string file = 1; repeated Node affected = 2; }
message Empty {}

service Yaad {
  // Unary
  rpc Remember(RememberRequest)     returns (Node);
  rpc Recall(RecallRequest)         returns (RecallResponse);
  rpc Context(ContextRequest)       returns (RecallResponse);
  rpc Forget(ForgetRequest)         returns (Empty);
  rpc Link(LinkRequest)             returns (Edge);
  rpc Unlink(UnlinkRequest)         returns (Empty);
  rpc Subgraph(SubgraphRequest)     returns (SubgraphResponse);
  rpc Impact(ImpactRequest)         returns (ImpactResponse);
  rpc SessionStart(SessionStartReq) returns (RecallResponse);
  rpc SessionEnd(SessionEndReq)     returns (SessionSummary);
  rpc Health(Empty)                 returns (HealthResponse);
  rpc GraphStats(Empty)             returns (GraphStatsResponse);

  // Streaming
  rpc WatchMemories(WatchRequest)   returns (stream MemoryEvent);
  rpc WatchStale(WatchRequest)      returns (stream StaleEvent);
}
